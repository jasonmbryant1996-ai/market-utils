name: BTC Regime Monitor

on:
  schedule:
    # Safety net only — every 6 hours in case the self-chain trigger below
    # ever fails to fire. The REAL continuity mechanism is the "Trigger
    # next run" step at the end of this job, not this cron schedule.
    - cron: "0 */1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # commit paper-trade state back to the repo

concurrency:
  group: regime-monitor
  cancel-in-progress: false   # queue, don't kill an in-progress loop

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # hard platform cap on GitHub-hosted runners is 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt --quiet

      # ── Fetch the sensitive core from a SEPARATE PRIVATE repo at runtime.
      # None of these three files are ever committed to THIS (public) repo —
      # they exist only on the ephemeral runner filesystem for the duration
      # of this job. Requires GH_PAT to have access to regime-core (a classic
      # PAT with full `repo` scope already covers every repo you own; a
      # fine-grained PAT needs regime-core added to its repository list).
      - name: Fetch private core (features / model architecture / registry)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e
          gh repo clone jasonmbryant1996-ai/regime-core /tmp/regime-core -- --depth=1
          cp /tmp/regime-core/src/features.py        src/features.py
          cp /tmp/regime-core/src/model_arch.py       src/model_arch.py
          cp /tmp/regime-core/src/model_registry.py   src/model_registry.py
          rm -rf /tmp/regime-core
          echo "Private core fetched (3 files) — not committed to this repo."

      # ── Download every model listed in MODEL_REGISTRY (src/live_monitor.py) ──
      # Each was uploaded separately via upload_model.yml with a matching
      # model_name input, producing an artifact "regime-model-<name>".
      #
      # Uses the repo-wide /actions/artifacts endpoint directly (one hop,
      # sorted by creation time) instead of first finding a successful
      # upload_model.yml run and then looking inside it — fewer places for
      # a lookup to fail. If this step 404s, it's almost always a GH_PAT
      # scope problem rather than a logic problem here: a 404 (not 403) on
      # a private repo's Actions API usually means the token can't see the
      # repo at all. Classic PAT needs full `repo` + `workflow` scopes;
      # fine-grained PAT needs this repo explicitly selected with
      # Actions: Read-and-write + Contents: Read-and-write.
      - name: Download model artifacts
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e
          for MODEL_NAME in bear_6h bull_48h; do
            echo "── Downloading regime-model-${MODEL_NAME//[a-z]/} ──"

            ARTIFACT_ID=$(gh api "/repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq "[.artifacts[] | select(.name==\"regime-model-${MODEL_NAME}\" and .expired==false)] | sort_by(.created_at) | last | .id")

            if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
              echo "ERROR: no non-expired artifact named regime-model-${MODEL_NAME} found."
              echo "Either upload_model.py hasn't been run for this model yet, or GH_PAT"
              echo "lacks Actions read access to this (private) repo — check its scope."
              exit 1
            fi

            gh api "/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" \
              > "/tmp/model_${MODEL_NAME}.zip"

            mkdir -p "model/${MODEL_NAME}"
            unzip -o -q "/tmp/model_${MODEL_NAME}.zip" -d "model/${MODEL_NAME}/"
            echo "  ✓ Model ready"
          done
          echo "All model artifacts downloaded."

      - name: Notify job start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          GITHUB_RUN_NUMBER:  ${{ github.run_number }}
        run: python src/notify_job.py start

      - name: Run regime monitor loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.email "regime-bot@users.noreply.github.com"
          git config user.name "regime-monitor-bot"

          JOB_START_TS=$(date +%s)
          echo "JOB_START_EPOCH=$JOB_START_TS" >> "$GITHUB_ENV"

          END_TIME=$(( JOB_START_TS + 335*60 ))   # ~5h35m, buffer under 350min timeout
          ITERATION=1
          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            python src/live_monitor.py || echo "Monitor run failed — continuing loop"
            echo "ITERATIONS=$ITERATION" >> "$GITHUB_ENV"
            ITERATION=$((ITERATION + 1))
            sleep 300
          done
          echo "ITERATIONS=$ITERATION" >> "$GITHUB_ENV"

      # ── Self-chain: immediately trigger the next run ────────────────────────
      - name: Trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run regime_monitor.yml --repo ${{ github.repository }} --ref main

      - name: Notify job end
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          GITHUB_RUN_NUMBER:  ${{ github.run_number }}
        run: python src/notify_job.py end