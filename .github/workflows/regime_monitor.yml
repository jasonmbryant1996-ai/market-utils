name: BTC Regime Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt --quiet
      - name: Install PyTorch
        run: python -m pip install -r requirements-torch.txt --quiet

      # ── Download model files from artifact storage ─────────────────────────
      # Model files are uploaded once via upload_model.yml and stored as a
      # GitHub Actions artifact — they never touch git history.
      # GH_PAT secret = a Personal Access Token with actions:read scope.
      - name: Download model artifact
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Find the most recent successful upload_model run
          RUN_ID=$(gh api \
            /repos/${{ github.repository }}/actions/workflows/upload_model.yml/runs \
            --jq '[.workflow_runs[] | select(.conclusion=="success")] | .[0].id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: No successful model upload found."
            echo "Go to Actions tab and run the 'Upload Model Files' workflow first."
            exit 1
          fi

          echo "Found model artifact in run $RUN_ID"

          # Get artifact ID
          ARTIFACT_ID=$(gh api \
            /repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[] | select(.name=="regime-model") | .id')

          echo "Artifact ID: $ARTIFACT_ID"

          # Download and unzip
          gh api \
            /repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip \
            > /tmp/model_artifact.zip

          mkdir -p model
          unzip -o /tmp/model_artifact.zip -d model/
          echo "Model files ready:"
          ls -lh model/*.pth model/*.pkl

      # ── Restore last known signal state ───────────────────────────────────
      - name: Restore signal state
        uses: actions/cache@v4
        with:
          path: state/last_signal.json
          key: regime-state-v1
          restore-keys: |
            regime-state-v1

      # ── Run the monitor ───────────────────────────────────────────────────
      - name: Run regime monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/live_monitor.py

      # ── Save updated signal state (always, even on failure) ───────────────
      - name: Save signal state
        if: always()
        uses: actions/cache@v4
        with:
          path: state/last_signal.json
          key: regime-state-v1-${{ github.run_id }}
          restore-keys: |
            regime-state-v1
