name: BTC Regime Monitor

on:
  schedule:
    # Fires every 5 hours as a restart safety-net. GitHub's scheduler is
    # unreliable at 5-min cadence, but hourly-or-slower triggers land
    # reliably. Each run loops internally every 5 min for ~5h40m.
    - cron: "0 */5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # required so the job can commit paper-trade state back to the repo

concurrency:
  group: regime-monitor
  cancel-in-progress: false   # queue, don't kill an in-progress loop

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # hard cap on GitHub-hosted runners is 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt --quiet

      - name: Download model artifact
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          RUN_ID=$(gh api \
            /repos/${{ github.repository }}/actions/workflows/upload_model.yml/runs \
            --jq '[.workflow_runs[] | select(.conclusion=="success")] | .[0].id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: No successful model upload found."
            exit 1
          fi

          ARTIFACT_ID=$(gh api \
            /repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[] | select(.name=="regime-model") | .id')

          gh api \
            /repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip \
            > /tmp/model_artifact.zip

          mkdir -p model
          unzip -o /tmp/model_artifact.zip -d model/
          ls -lh model/*.pth model/*.pkl

      # ── Job-start notification ───────────────────────────────────────────────
      - name: Notify job start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          GITHUB_RUN_NUMBER:  ${{ github.run_number }}
        run: python src/notify_job.py start

      # ── Main loop: check every 5 minutes for ~5h40m ─────────────────────────
      # state/last_signal.json is committed directly to the repo after every
      # iteration by live_monitor.py — durable across restarts, no cache
      # subsystem involved.
      - name: Run regime monitor loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.email "regime-bot@users.noreply.github.com"
          git config user.name "regime-monitor-bot"

          JOB_START_TS=$(date +%s)
          echo "JOB_START_EPOCH=$JOB_START_TS" >> "$GITHUB_ENV"

          END_TIME=$(( JOB_START_TS + 340*60 ))   # run ~5h40m, buffer under 350min timeout
          ITERATION=1
          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            echo "=== Iteration $ITERATION  ($(date -u '+%Y-%m-%d %H:%M:%S') UTC) ==="
            python src/live_monitor.py || echo "Monitor run failed — continuing loop"
            echo "ITERATIONS=$ITERATION" >> "$GITHUB_ENV"
            ITERATION=$((ITERATION + 1))
            sleep 300
          done
          echo "ITERATIONS=$ITERATION" >> "$GITHUB_ENV"
          echo "Loop finished after $ITERATION iterations — exiting for scheduled restart"

      # ── Job-end notification (fires even if the loop step failed/was cut short) ─
      - name: Notify job end
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          GITHUB_RUN_NUMBER:  ${{ github.run_number }}
        run: python src/notify_job.py end