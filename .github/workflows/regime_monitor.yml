name: BTC Regime Monitor

on:
  schedule:
    - cron: "0 */5 * * *"   # every 5 hours as restart safety-net
  workflow_dispatch: {}

concurrency:
  group: regime-monitor
  cancel-in-progress: false   # queue, don't kill an in-progress loop

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # hard cap on GitHub-hosted runners is 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt --quiet

      - name: Download model artifact
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          RUN_ID=$(gh api \
            /repos/${{ github.repository }}/actions/workflows/upload_model.yml/runs \
            --jq '[.workflow_runs[] | select(.conclusion=="success")] | .[0].id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: No successful model upload found."
            exit 1
          fi

          ARTIFACT_ID=$(gh api \
            /repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[] | select(.name=="regime-model") | .id')

          gh api \
            /repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip \
            > /tmp/model_artifact.zip

          mkdir -p model
          unzip -o /tmp/model_artifact.zip -d model/
          ls -lh model/*.pth model/*.pkl

      - name: Restore signal state
        uses: actions/cache@v4
        with:
          path: state/last_signal.json
          key: regime-state-v1
          restore-keys: |
            regime-state-v1

      # ── Loop: run the monitor every 5 minutes for ~5h45m ──────────────────
      # State persists as a plain local file across iterations within this
      # single job — no need to save/restore the cache mid-loop, only once
      # at the very end (see "Save signal state" step below).
      - name: Run regime monitor loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          END_TIME=$(( $(date +%s) + 345*60 ))   # run for 5h45m, then exit cleanly
          ITERATION=1
          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            echo "=== Iteration $ITERATION  ($(date -u '+%Y-%m-%d %H:%M:%S') UTC) ==="
            python src/live_monitor.py || echo "Monitor run failed — continuing loop"
            ITERATION=$((ITERATION + 1))
            sleep 300
          done
          echo "Loop finished after $ITERATION iterations — exiting for scheduled restart"

      - name: Save signal state
        if: always()
        uses: actions/cache@v4
        with:
          path: state/last_signal.json
          key: regime-state-v1-${{ github.run_id }}
          restore-keys: |
            regime-state-v1