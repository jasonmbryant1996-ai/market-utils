name: BTC Regime Monitor

on:
  schedule:
    # Fires every 5 hours as a restart safety-net. GitHub's scheduler is
    # unreliable at 5-min cadence, but hourly-or-slower triggers land
    # reliably. Each run loops internally every 5 min for ~4h45m.
    - cron: "0 */5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # required so the job can commit paper-trade state back to the repo

concurrency:
  group: regime-monitor
  cancel-in-progress: false   # queue, don't kill an in-progress loop

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # ~5h50m — leaves buffer under the 6h gap.
                              # If exceeded, GitHub cancels (not "fails") the
                              # job. Trade state up to the last committed
                              # iteration is preserved via git (see below) —
                              # this is NOT dependent on this step finishing.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Default token + persist-credentials:true (default) lets the loop
        # below `git push` state commits back to this same repo, since we
        # granted `contents: write` above.

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt --quiet

      - name: Download model artifact
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          RUN_ID=$(gh api \
            /repos/${{ github.repository }}/actions/workflows/upload_model.yml/runs \
            --jq '[.workflow_runs[] | select(.conclusion=="success")] | .[0].id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: No successful model upload found."
            exit 1
          fi

          ARTIFACT_ID=$(gh api \
            /repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[] | select(.name=="regime-model") | .id')

          gh api \
            /repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip \
            > /tmp/model_artifact.zip

          mkdir -p model
          unzip -o /tmp/model_artifact.zip -d model/
          ls -lh model/*.pth model/*.pkl

      # ── NOTE: no cache-based state restore/save anymore ────────────────────
      # state/last_signal.json is committed directly to the repo by
      # live_monitor.py after every iteration (see git_commit_state()).
      # The checkout step above already pulls the latest committed version —
      # this is more durable than GitHub Actions cache, which only saves
      # once at job end and can be lost entirely if a timeout cancels the
      # job mid-loop.

      - name: Run regime monitor loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          git config user.email "regime-bot@users.noreply.github.com"
          git config user.name "regime-monitor-bot"

          END_TIME=$(( $(date +%s) + 340*60 ))   # run for 4h40m, then exit cleanly
          ITERATION=1
          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            echo "=== Iteration $ITERATION  ($(date -u '+%Y-%m-%d %H:%M:%S') UTC) ==="
            python src/live_monitor.py || echo "Monitor run failed — continuing loop"
            ITERATION=$((ITERATION + 1))
            sleep 300
          done
          echo "Loop finished after $ITERATION iterations — exiting for scheduled restart"